server {
    listen 80;
    listen [::]:80;
    server_name cocofashionbrands.com www.cocofashionbrands.com;

    root /var/www/cocofashionbrands.com/current/dist;
    index index.html;

    client_max_body_size 20m;

    # Gzip compression
    gzip on;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_types text/html text/css application/javascript application/json text/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # Long-lived cache for hashed build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Short cache for HTML (the SPA shell)
    location = /index.html {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # Static images from dist
    location ~* \.(png|jpg|jpeg|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Serve uploads directly (skip Express round-trip)
    location /uploads {
        alias /var/www/cocofashionbrands.com/current/uploads;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API and auth to Express backend
    location ~ ^/(api|auth) {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}
